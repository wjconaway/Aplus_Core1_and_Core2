<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A+ 1201 Core 1 Practice Exam</title>
<style>
    /* 1. DEFINE THE COLOR THEMES */
    :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --secondary-text: #64748b;
        --border: #e2e8f0;
        --primary: #2563eb;
    }

    body.dark-mode {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
        --secondary-text: #94a3b8;
        --border: #334155;
        --primary: #3b82f6;
    }

    /* 2. CORE LAYOUT */
    body { 
        font-family: 'Inter', -apple-system, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        padding: 40px 20px;
        transition: background 0.3s, color 0.3s;
        margin: 0;
    }

    /* 3. THE EXAM CARD */
    #quiz-container { 
        background: var(--card); 
        padding: 30px; 
        border-radius: 16px; 
        border: 1px solid var(--border);
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        max-width: 650px; 
        width: 100%; 
    }

    /* 4. PROGRESS BAR */
    .progress-container {
        width: 100%;
        background: var(--border);
        height: 8px;
        border-radius: 10px;
        margin-bottom: 25px;
        overflow: hidden;
    }
    #progress-bar {
        width: 0%;
        height: 100%;
        background: var(--primary);
        transition: width 0.3s ease;
    }

    /* 5. TEXT ELEMENTS */
    #progress { color: var(--secondary-text); font-size: 0.9rem; margin-bottom: 10px; }
    #question-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }

    /* 6. BUTTONS */
    .option-btn { 
        display: block; 
        width: 100%; 
        padding: 15px; 
        margin: 10px 0; 
        border: 1px solid var(--border); 
        border-radius: 10px; 
        background: var(--card); 
        color: var(--text);
        cursor: pointer; 
        text-align: left;
        font-size: 1rem;
        transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { 
        background: var(--bg); 
        border-color: var(--primary); 
    }
    .option-btn:disabled { cursor: default; }

    /* 7. NAVIGATION & TOGGLES */
    .back-home { align-self: flex-start; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 500; }
    
    .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        border-radius: 30px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* 8. FEEDBACK AREA */
    #explanation { 
        margin-top: 20px; 
        padding: 20px; 
        border-radius: 10px; 
        background: var(--bg); 
        border-left: 5px solid var(--primary); 
        display: none; 
        font-size: 0.95rem;
        line-height: 1.6;
    }
    
    #next-btn { 
        width: 100%;
        margin-top: 20px; 
        padding: 16px; 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 10px; 
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer; 
        display: none; 
    }
    /* Mobile Portrait Adjustments */
@media screen and (max-width: 600px) {
    body {
        padding: 10px; /* Reduce outer padding to give the card more room */
    }
    
    #quiz-container {
        padding: 20px 15px; /* Narrower padding inside the card */
        width: 100%; /* Ensure it takes full width */
        border-radius: 0; /* Optional: removing rounded corners looks better on tiny screens */
        box-shadow: none; /* Simplifies the look for mobile */
    }

    #question-text {
        font-size: 1.1rem; /* Slightly smaller text for long questions */
    }

    .option-btn {
        padding: 12px; /* Thinner buttons to save vertical space */
        font-size: 0.95rem;
    }

    .theme-toggle {
        top: 10px;
        right: 10px;
        padding: 6px 10px;
        font-size: 0.7rem;
    }
}
</style>
</head>

    {"q": "Which connector is used to provide extra 12V power to the CPU?", "o": ["A. 24-pin ATX", "B. 4/8-pin EPS", "C. 6-pin PCIe", "D. 15-pin SATA"], "a": "B", "e": "The EPS (Entry-level Power Supply) connector provides dedicated power to the processor."},

    {"q": "Which wireless standard is capable of using both 2.4GHz and 5GHz frequencies simultaneously?", "o": ["A. 802.11b", "B. 802.11g", "C. 802.11n", "D. 802.11a"], "a": "C", "e": "802.11n (Wi-Fi 4) was the first major standard to introduce dual-band support."},

    {"q": "What is the maximum speed of a USB 3.0 (USB 3.1 Gen 1) connection?", "o": ["A. 480 Mbps", "B. 5 Gbps", "C. 10 Gbps", "D. 20 Gbps"], "a": "B", "e": "USB 3.0/3.1 Gen 1 provides a theoretical maximum speed of 5 Gigabits per second."},
    {"q": "A user reports they can only see an image on their laptop screen when in a very bright room. What failed?", "o": ["A. Digitizer", "B. Backlight/Inverter", "C. GPU", "D. LCD Panel"], "a": "B", "e": "If the LCD is working but unlit, the backlight or its power source is the problem."},
    {"q": "Which networking device is used to extend a signal across a longer distance without making routing decisions?", "o": ["A. Router", "B. Switch", "C. Repeater/Extender", "D. Firewall"], "a": "C", "e": "A repeater simply takes a signal and re-broadcasts it to extend the range."},
    {"q": "Which type of RAM is typically used for a laptop's video memory if it doesn't have a dedicated card?", "o": ["A. Shared system RAM", "B. VRAM", "C. GDDR6", "D. HBM"], "a": "A", "e": "Integrated graphics (onboard) use a portion of the system's SODIMM RAM as video memory."},
    {"q": "Which port and protocol are used to transfer files securely via SSH?", "o": ["A. Port 20/21 (FTP)", "B. Port 22 (SFTP)", "C. Port 69 (TFTP)", "D. Port 445 (SMB)"], "a": "B", "e": "SFTP (Secure FTP) runs over the SSH protocol on port 22."},
    {"q": "Which tool would you use to attach an RJ-45 connector to a UTP cable?", "o": ["A. Punchdown tool", "B. Crimper", "C. Wire stripper", "D. Multimeter"], "a": "B", "e": "A crimper 'crimps' the connector pins into the copper wires."},

    {"q": "Which technology is used for short-range communication like mobile payments?", "o": ["A. Bluetooth", "B. NFC", "C. Infrared", "D. 802.11ax"], "a": "B", "e": "NFC (Near Field Communication) works within a range of about 4 centimeters."},
    {"q": "Which motherboard component manages communication between the CPU and the RAM?", "o": ["A. Southbridge", "B. Northbridge/Memory Controller", "C. BIOS", "D. CMOS"], "a": "B", "e": "The Northbridge (or integrated memory controller in modern CPUs) handles high-speed communication."},
    {"q": "Which type of printer uses an electrical charge to attract toner to a drum?", "o": ["A. Inkjet", "B. Impact", "C. Laser", "D. Thermal"], "a": "C", "e": "Laser printers use the 'Electrostatic' process to move toner."},
    {"q": "Which cloud model involves a mix of on-premises infrastructure and public cloud services?", "o": ["A. Public", "B. Private", "C. Hybrid", "D. Community"], "a": "C", "e": "Hybrid clouds allow organizations to keep sensitive data local while using public clouds for scale."},
    {"q": "Which port is used for unencrypted web traffic?", "o": ["A. 22", "B. 80", "C. 443", "D. 3389"], "a": "B", "e": "HTTP uses port 80; HTTPS uses port 443."},
    {"q": "A technician is using a multimeter to test a wall outlet. What should the setting be?", "o": ["A. DC Voltage", "B. AC Voltage", "C. Continuity", "& D. Resistance"], "a": "B", "e": "Wall outlets provide Alternating Current (AC)."},
    {"q": "What is the primary benefit of ECC RAM?", "o": ["A. Higher clock speeds", "B. Lower power consumption", "C. Detecting and correcting memory errors", "D. Smaller physical size"], "a": "C", "e": "ECC (Error Correction Code) RAM is used in servers to prevent data corruption."},
    {"q": "A technician needs to find where a network cable goes through a wall. Which tool should they use?", "o": ["A. Multimeter", "B. Tone generator and probe", "C. Loopback plug", "D. Wi-Fi analyzer"], "a": "B", "e": "The tone generator sends a signal that the probe can detect through walls or in bundles."},
    {"q": "A technician is configuring a virtual machine and wants to ensure it can communicate with other VMs on the same host but NOT the physical network. Which mode should be used?", "o": ["A. Bridged", "B. NAT", "C. Internal/Host-only", "D. Public"], "a": "C", "e": "Host-only or Internal networking isolates VMs to a private network within the hypervisor."},
    {"q": "Which type of printer uses a heating element and special chemically-treated paper to create images?", "o": ["A. Laser", "B. Inkjet", "C. Thermal", "D. Impact"], "a": "C", "e": "Thermal printers (common for receipts) use heat to turn specific areas of chemically-treated paper black."},
    {"q": "A user reports their laptop is plugged in but the battery is not charging. Which of the following should be checked first?", "o": ["A. Replace the motherboard", "B. Perform a battery calibration", "C. Verify the AC adapter and power port", "D. Reinstall the OS"], "a": "C", "e": "Always start with the simplest physical connections: the power brick and the DC-in jack."},
    {"q": "Which cloud service model provides the end-user with a complete, usable application like Microsoft 365 or Salesforce?", "o": ["A. IaaS", "B. PaaS", "C. SaaS", "D. DaaS"], "a": "C", "e": "Software as a Service (SaaS) delivers a finished product managed by the provider."},
    {"q": "Which networking protocol is used to retrieve email from a server and delete it from the server once downloaded?", "o": ["A. IMAP", "B. POP3", "C. SMTP", "D. SNMP"], "a": "B", "e": "POP3 (Port 110) traditionally downloads and removes mail from the server, unlike IMAP which syncs it."},
    {"q": "A technician is installing a CPU and notices small gold pins on the motherboard socket rather than on the CPU itself. Which socket type is this?", "o": ["A. PGA", "B. LGA", "C. BGA", "D. DIP"], "a": "B", "e": "Land Grid Array (LGA) sockets have pins on the motherboard; Pin Grid Array (PGA) has pins on the CPU."},
    {"q": "Which port is used by the SMB/CIFS protocol for modern Windows file sharing?", "o": ["A. 139", "B. 445", "C. 548", "D. 427"], "a": "B", "e": "Modern SMB (Server Message Block) runs directly over TCP on port 445."},
    {"q": "A user needs a cable to connect a laptop to a projector. Both devices have a port with a 'lightning bolt' icon. Which cable is most likely required?", "o": ["A. USB 3.0", "B. Thunderbolt", "C. Mini-DisplayPort", "D. FireWire"], "a": "B", "e": "The lightning bolt symbol indicates a Thunderbolt port, which supports high-speed data and video."},
    {"q": "Which tool is used to test the voltage levels of a power supply's 24-pin connector?", "o": ["A. Loopback plug", "B. PSU Tester / Multimeter", "C. Cable stripper", "D. Tone probe"], "a": "B", "e": "A PSU tester or a multimeter can verify if the 3.3V, 5V, and 12V rails are outputting correctly."},
    {"q": "Which wireless standard operates in both 2.4GHz and 5GHz and supports speeds up to 600 Mbps?", "o": ["A. 802.11g", "B. 802.11a", "C. 802.11n", "D. 802.11ac"], "a": "C", "e": "802.11n (Wi-Fi 4) was the first major dual-band standard to reach these speeds using MIMO."},
    {"q": "Which component in a laser printer is responsible for cleaning the excess toner off the imaging drum?", "o": ["A. Fuser", "B. Transfer roller", "C. Cleaning blade", "D. Pickup roller"], "a": "C", "e": "The rubber cleaning blade scrapes residual toner into a waste hopper before the next cycle."},
    {"q": "Which type of storage provides the fastest data access for a gaming laptop?", "o": ["A. 7200 RPM HDD", "B. SATA SSD", "C. NVMe SSD", "D. SSHD"], "a": "C", "e": "NVMe SSDs use the PCIe bus, bypassing the slower SATA interface for much higher speeds."},
    {"q": "Which cloud concept allows a provider to serve multiple customers by 'carving up' physical hardware into virtual instances?", "o": ["A. Rapid elasticity", "B. Measured service", "C. Resource pooling", "D. On-demand self-service"], "a": "C", "e": "Resource pooling allows the cloud provider to share hardware dynamically among many users."},
    {"q": "A technician needs to find the IP address of a web server based on its domain name. Which command should they use?", "o": ["A. ipconfig", "B. nslookup", "C. netstat", "D. nbtstat"], "a": "B", "e": "nslookup queries DNS servers to find IP addresses associated with hostnames."},
    {"q": "Which laptop component is most likely to be an OLED panel?", "o": ["A. The hard drive", "B. The screen", "C. The touchpad", "D. The battery"], "a": "B", "e": "OLED is a high-end display technology used for screens."},
    {"q": "Which port is used by the SLP (Service Location Protocol)?", "o": ["A. 427", "B. 548", "C. 445", "D. 143"], "a": "A", "e": "SLP uses port 427 to help devices find services like printers on the local network."},
    {"q": "A printer is producing vertical black lines down every page. What is the most likely cause?", "o": ["A. Low toner", "B. Scratched imaging drum", "C. Failed fuser", "D. Clogged ink nozzle"], "a": "B", "e": "A physical scratch on the imaging drum will pick up toner and create a continuous line on the page."},
    {"q": "Which technology allows a single physical network cable to carry multiple separate virtual networks?", "o": ["A. VPN", "B. VLAN / Trunking", "C. DHCP", "D. DNS"], "a": "B", "e": "VLANs allow network admins to segment traffic; trunking allows multiple VLANs over one physical link."},
    {"q": "A technician is installing RAM in a dual-channel motherboard. How should the modules be installed?", "o": ["A. In any two slots", "B. In slots of the same color", "C. Only in the first slot", "D. In the slots closest to the CPU"], "a": "B", "e": "Dual-channeling requires pairs of modules to be placed in specific slots (usually color-coded)."},
    {"q": "Which cloud model is a collaboration between several organizations with shared security or compliance goals?", "o": ["A. Public", "B. Private", "C. Hybrid", "D. Community"], "a": "D", "e": "Community clouds are for specific groups, like government agencies or hospitals."},
    {"q": "Which protocol is used to provide encrypted web traffic?", "o": ["A. HTTP", "B. HTTPS", "C. FTP", "D. SSH"], "a": "B", "e": "HTTPS (Port 443) uses SSL/TLS to encrypt web communications."},
    {"q": "A user's phone is very hot and the battery is draining, but they are not using any apps. What should the technician check?", "o": ["A. Screen brightness", "B. Signal strength / Roaming", "C. The charging cable", "D. The SIM card"], "a": "B", "e": "Searching for a weak signal causes a mobile radio to use significantly more power."},
    {"q": "Which port is used by the Telnet protocol?", "o": ["A. 21", "B. 22", "C. 23", "D. 25"], "a": "C", "e": "Telnet uses port 23; it is unencrypted and rarely used today in favor of SSH."},
    {"q": "Which hardware device is used to connect a computer to a cable or DSL provider's network?", "o": ["A. Switch", "B. Hub", "C. Modem", "D. Bridge"], "a": "C", "e": "A modem modulates and demodulates signals between the ISP and the local network."},
    {"q": "Which type of storage is commonly used for mobile device expansion and digital cameras?", "o": ["A. NVMe", "B. SATA", "C. SD / MicroSD", "D. HDD"], "a": "C", "e": "SD and MicroSD cards are the standard for small-format portable storage expansion."},
    {"q": "Which tool is used to remove the insulation from the end of a network cable?", "o": ["A. Crimper", "B. Punchdown tool", "C. Wire stripper", "D. Multimeter"], "a": "C", "e": "Wire strippers remove the outer jacket without damaging the copper strands inside."},
    {"q": "Which cloud concept refers to the ability to scale up or down resource capacity as needed?", "o": ["A. Rapid elasticity", "B. Measured service", "C. Pooling", "D. Broad access"], "a": "A", "e": "Elasticity allows a system to handle spikes in traffic by automatically adding resources."},
    {"q": "What is the primary function of a BIOS/UEFI 'Supervisor Password'?", "o": ["A. To encrypt the hard drive", "B. To prevent unauthorized users from changing BIOS settings", "C. To log into Windows", "D. To bypass the firewall"], "a": "B", "e": "Supervisor passwords protect the firmware configuration from being altered."},
    {"q": "Which type of internal laptop expansion card is primarily used for Wi-Fi and Bluetooth?", "o": ["A. M.2 / Mini-PCIe", "B. DIMM", "C. SATA", "D. AGP"], "a": "A", "e": "Most modern laptops use M.2 (or older Mini-PCIe) for wireless connectivity modules."},
    {"q": "A user's laser printer is producing documents where the toner rubs off easily. What should be replaced?", "o": ["A. Toner cartridge", "B. Imaging drum", "C. Fuser assembly", "D. Pickup rollers"], "a": "C", "e": "The fuser uses heat to melt toner into the paper; if it rubs off, the fuser isn't working."},
    {"q": "Which port is used for secure file transfer (SFTP)?", "o": ["A. 20", "B. 21", "C. 22", "D. 23"], "a": "C", "e": "SFTP runs over SSH, which uses port 22."},
    {"q": "Which component allows a laptop to be used as a desktop by connecting it to multiple monitors and peripherals with one cable?", "o": ["A. USB Hub", "B. Port Replicator / Docking Station", "C. Inverter", "D. KVM Switch"], "a": "B", "e": "Docking stations provide desktop-like connectivity for portable laptops."},
    {"q": "Which networking protocol uses Port 53?", "o": ["A. HTTP", "B. DNS", "C. DHCP", "D. SMTP"], "a": "B", "e": "DNS (Domain Name System) uses port 53 for name resolution."},

    {"q": "Which cloud service model is essentially 'hardware for rent'?", "o": ["A. SaaS", "B. PaaS", "C. IaaS", "D. DaaS"], "a": "C", "e": "Infrastructure as a Service (IaaS) provides servers, storage, and networking as a service."},
    {"q": "Which wireless frequency offers more channels and higher speeds but has a shorter range?", "o": ["A. 2.4 GHz", "B. 5.0 GHz", "C. 900 MHz", "D. 1.2 GHz"], "a": "B", "e": "5GHz is faster and less congested but cannot penetrate walls as well as 2.4GHz."},
    {"q": "Which type of RAM must be refreshed constantly to maintain data?", "o": ["A. SRAM", "B. DRAM", "C. ROM", "D. Flash"], "a": "B", "e": "Dynamic RAM (DRAM) uses capacitors that leak charge and require frequent 'refresh' cycles."},

    {"q": "Which port is used by the IMAP protocol?", "o": ["A. 110", "B. 143", "C. 443", "D. 993"], "a": "B", "e": "IMAP (unencrypted) uses port 143; IMAPS (encrypted) uses port 993."},
    {"q": "What is the maximum speed of a Category 6 (Cat 6) cable at 100 meters?", "o": ["A. 100 Mbps", "B. 1 Gbps", "C. 10 Gbps", "D. 40 Gbps"], "a": "B", "e": "Cat 6 supports 10Gbps at shorter distances (up to 55m), but is rated for 1Gbps at 100m."},
    {"q": "Which motherboard component acts as a security chip for hardware encryption?", "o": ["A. BIOS", "B. CMOS", "C. TPM", "D. Northbridge"], "a": "C", "e": "The Trusted Platform Module (TPM) stores encryption keys and certificates."},
    {"q": "A technician needs to connect a workstation to a network using a protocol that ensures reliable, ordered delivery. Which protocol is this?", "o": ["A. UDP", "B. TCP", "C. IP", "D. ICMP"], "a": "B", "e": "TCP (Transmission Control Protocol) is connection-oriented and ensures data arrives correctly."},
    {"q": "Which technology is used to provide power to a device through a network cable?", "o": ["A. PoE", "B. QoS", "C. WPS", "D. DMZ"], "a": "A", "e": "Power over Ethernet (PoE) allows devices like IP cameras to get power and data over one cable."},
    {"q": "Which laptop component is most likely to be found behind the display panel?", "o": ["A. RAM", "B. Wi-Fi Antennas", "C. Battery", "D. Hard Drive"], "a": "B", "e": "Placing antennas in the lid (the highest point) provides the best wireless reception."},
    {"q": "Which port is used by the RDP protocol?", "o": ["A. 22", "B. 443", "C. 3389", "D. 5900"], "a": "C", "e": "Remote Desktop Protocol (RDP) uses port 3389."},
    {"q": "Which type of printer uses a 'ribbon' and is commonly used for multi-part forms?", "o": ["A. Laser", "B. Inkjet", "C. Impact / Dot Matrix", "D. Thermal"], "a": "C", "e": "Impact printers physically strike a ribbon to transfer ink to paper."},
    {"q": "A technician is installing a liquid cooling system. Which component sits directly on the CPU?", "o": ["A. Radiator", "B. Pump / Water block", "C. Reservoir", "D. Fan"], "a": "B", "e": "The water block transfers heat from the CPU to the liquid coolant."},
    {"q": "Which cloud characteristic allows users to pay for only the storage they actually use?", "o": ["A. Pooling", "B. Elasticity", "C. Measured service", "D. Self-service"], "a": "C", "e": "Measured service is 'pay-per-use' billing."},
    {"q": "Which port is used by the SNMP protocol for receiving traps?", "o": ["A. 161", "B. 162", "C. 443", "D. 514"], "a": "B", "e": "SNMP uses 161 for queries and 162 for 'traps' (unsolicited notifications)."},
    {"q": "What is the primary purpose of a laptop's fn (Function) key?", "o": ["A. To access the BIOS", "B. To toggle hardware features like volume and brightness", "C. To right-click", "D. To refresh the page"], "a": "B", "e": "The 'fn' key allows small laptop keyboards to have dual functions for many keys."},
    {"q": "Which connector type is used to provide power to a 3.5-inch internal magnetic hard drive?", "o": ["A. 8-pin EPS", "B. 15-pin SATA", "C. 4-pin Berg", "D. 6-pin PCIe"], "a": "B", "e": "The 15-pin SATA power connector is the standard for both 3.5-inch HDDs and 2.5-inch SSDs."},
    {"q": "A technician is installing a home theater PC. Which cable allows for the transmission of both high-definition video and multi-channel digital audio?", "o": ["A. VGA", "B. DVI-D", "C. HDMI", "D. S-Video"], "a": "C", "e": "HDMI was designed specifically to carry uncompressed video and audio data in a single cable."},
    {"q": "Which networking device operates at Layer 3 of the OSI model and makes forwarding decisions based on IP addresses?", "o": ["A. Hub", "B. Switch", "C. Router", "D. Bridge"], "a": "C", "e": "Routers are Layer 3 devices; they connect different networks and use IP routing tables."},
    {"q": "A user wants to ensure their laptop screen is visible in direct sunlight. Which display specification should they look for?", "o": ["A. High Refresh Rate", "B. High Contrast Ratio", "C. High Nits (Brightness)", "D. Low Latency"], "a": "C", "e": "Nits are a unit of measurement for luminance (brightness). Higher nits help overcome glare from sunlight."},
    {"q": "Which tool is used to test the continuity of a copper wire to ensure there are no internal breaks?", "o": ["A. Loopback plug", "B. Multimeter", "C. Toner probe", "D. Wi-Fi analyzer"], "a": "B", "e": "Setting a multimeter to 'Continuity' mode causes a beep if electricity can flow from one end to the other."},
    {"q": "A technician is replacing a laptop's internal speakers. Which component must usually be removed first in most laptop designs?", "o": ["A. The LCD screen", "B. The bottom case or palmrest", "C. The CPU", "D. The Wi-Fi antenna"], "a": "B", "e": "Most internal laptop repairs begin with removing the bottom base cover or the palmrest assembly."},
    {"q": "Which wireless standard is limited to the 2.4GHz band and has a maximum speed of 54 Mbps?", "o": ["A. 802.11a", "B. 802.11b", "C. 802.11g", "D. 802.11ac"], "a": "C", "e": "802.11g offers 54 Mbps on the 2.4GHz band; 802.11a offers the same speed but only on 5GHz."},
    {"q": "Which type of storage is commonly used in high-end servers for its high speed and reliability, utilizing a 12Gbps interface?", "o": ["A. SATA SSD", "B. SAS (Serial Attached SCSI)", "C. NVMe", "D. USB 3.2"], "a": "B", "e": "SAS drives are faster and more reliable versions of SATA, specifically used in enterprise environments."},
    {"q": "A user's laser printer keeps displaying a 'Replace Maintenance Kit' error. What is typically included in this kit?", "o": ["A. Toner and Ink", "B. Fuser and Pickup Rollers", "C. Motherboard and RAM", "D. Paper Tray and LCD"], "a": "B", "e": "Maintenance kits usually replace the high-wear items like the fuser assembly and rubber rollers."},
    {"q": "Which port is used by the LDAP protocol for unencrypted directory services?", "o": ["A. 389", "B. 636", "C. 3389", "D. 443"], "a": "A", "e": "LDAP uses port 389; LDAPS (Secure) uses port 636."},
    {"q": "Which laptop component converts the movement of a finger into a mouse cursor's movement?", "o": ["A. Digitizer", "B. Touchpad", "C. Inverter", "D. Trackball"], "a": "B", "e": "The touchpad (trackpad) is the primary pointing device on a laptop."},
    {"q": "A technician needs to connect a server to a SAN (Storage Area Network). Which cable type is most commonly used for this high-speed connection?", "o": ["A. Cat 5e", "B. Fiber Optic", "C. Coaxial", "D. USB-C"], "a": "B", "e": "Fiber optics provide the low latency and high bandwidth required for SAN environments."},
    {"q": "Which motherboard component is used to store the specific time, date, and hardware configuration settings?", "o": ["A. BIOS chip", "B. CMOS RAM", "C. Southbridge", "D. TPM"], "a": "B", "e": "While the BIOS is the code, the CMOS RAM is the memory that stores the settings, powered by the CMOS battery."},
    {"q": "A user reports that their mobile device's screen is completely black, but they can still hear sounds and feel vibrations. What is the most likely hardware failure?", "o": ["A. The battery", "B. The digitizer", "C. The display assembly (LCD/OLED)", "D. The charging port"], "a": "C", "e": "Sound and vibration mean the phone is 'alive,' but the lack of image points to a dead display panel."},
    {"q": "Which cloud characteristic refers to multiple customers sharing the same physical storage and processing power?", "o": ["A. Rapid elasticity", "B. Resource pooling", "C. Measured service", "D. Broad network access"], "a": "B", "e": "Resource pooling is a fundamental cloud tenant where resources are logically separated but physically shared."},
    {"q": "Which port is used by the POP3S (Secure) protocol?", "o": ["A. 110", "B. 143", "C. 993", "D. 995"], "a": "D", "e": "POP3 uses 110; the secure version (POP3S) uses 995."},
    {"q": "Which type of RAM is specifically used in graphics cards for high-speed video processing?", "o": ["A. DDR5", "B. GDDR6", "C. SODIMM", "D. LPDDR4"], "a": "B", "e": "GDDR (Graphics Double Data Rate) is optimized for the high bandwidth needed by GPUs."},
    {"q": "A technician is installing a new SOHO router. Which of the following is the first thing they should change for security?", "o": ["A. The SSID", "B. The default administrator password", "C. The Wi-Fi channel", "D. The DHCP range"], "a": "B", "e": "Default passwords (like 'admin/admin') are public knowledge and are the first point of attack."},
    {"q": "Which type of printer is most likely to be used for printing carbonless multi-part shipping labels?", "o": ["A. Laser", "B. Thermal", "C. Dot Matrix", "D. Inkjet"], "a": "C", "e": "Impact printers (Dot Matrix) are required for 'impact' paper that requires physical pressure to mark multiple layers."},
    {"q": "Which tool is used to monitor and analyze the traffic on a wireless network to find interference?", "o": ["A. Loopback plug", "B. Wi-Fi Analyzer", "C. Tone probe", "D. Multimeter"], "a": "B", "e": "A Wi-Fi analyzer shows which channels are congested by neighboring networks."},
    {"q": "Which type of CPU cooling uses a metal block with fins and a fan but no liquid?", "o": ["A. Passive cooling", "B. Active air cooling", "C. Liquid cooling", "D. Immersion cooling"], "a": "B", "e": "Active air cooling uses a heat sink (passive) plus a fan (active) to move heat away."},
    {"q": "Which port is used by the IMAPS (Secure) protocol?", "o": ["A. 143", "B. 465", "C. 587", "D. 993"], "a": "D", "e": "IMAP uses 143; the secure version (IMAPS) uses 993."},
    {"q": "A technician is replacing a laptop's Wi-Fi card. How many wires must usually be reconnected to the card?", "o": ["A. 1", "B. 2 (Main and Aux)", "C. 4", "D. 8"], "a": "B", "e": "Most laptop Wi-Fi cards use two small antenna wires (Main and Auxiliary) for diversity and better signal."},

    let currentExam = [];
    let currentIndex = 0;
    let score = 0;

    function startExam() {
        // Randomly shuffle and pick 75
        currentExam = questions.sort(() => 0.5 - Math.random()).slice(0, 75);
        showQuestion();
    }

    function showQuestion() {
        const q = currentExam[currentIndex];
        const percent = ((currentIndex) / currentExam.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of 75`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt[0], q.a, q.e);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, exp) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        const explanationDiv = document.getElementById('explanation');
        explanationDiv.style.display = 'block';
        
        if (selected === correct) {
            explanationDiv.innerHTML = `<span style="color:green; font-weight:bold;">Correct!</span>`;
            score++;
        } else {
            explanationDiv.innerHTML = `<span style="color:red; font-weight:bold;">Incorrect.</span> Correct answer was ${correct}.<br><br><strong>Note:</strong> ${exp}`;
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentExam.length) {
            showQuestion();
        } else {
            document.getElementById('question-text').style.display = 'none';
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('final-score').style.display = 'block';
            document.getElementById('score-display').innerText = `${score} / 75 (${((score/75)*100).toFixed(1)}%)`;
        }
    }

    startExam();
    function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    // Save preference to the browser
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

// Check for saved theme on load
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('Service Worker Registered'))
    .catch(err => console.log('Service Worker Failed', err));
}
</script>
