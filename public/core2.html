        {"q": "A user's laptop was stolen. The technician wants to ensure that even if the thief removes the hard drive, the data is unreadable. What should have been enabled?", "o": ["A. BIOS Password", "B. BitLocker (Full Disk Encryption)", "C. Windows Firewall", "D. Strong User Password"], "a": "B", "e": "Full disk encryption protects the data even if the physical drive is moved to another computer."},
        {"q": "Which Linux command is used to display the computer's name?", "o": ["A. whoami", "B. hostname", "C. name", "& D. ip addr"], "a": "B", "e": "'hostname' tells you the network name of the machine."},
        {"q": "Which type of social engineering involves an attacker leaving a malware-infected USB drive in a public place?", "o": ["A. Phishing", "B. Baiting", "C. Vishing", "D. Tailgating"], "a": "B", "e": "Baiting uses the victim's curiosity against them."},
        {"q": "What is 'Safe Mode with Networking'?", "o": ["A. A mode for gaming", "B. A diagnostic mode that loads only essential drivers plus network drivers", "C. A mode that makes the internet faster", "D. A mode for downloading viruses"], "a": "B", "e": "Safe Mode with Networking is used when you need to download a repair tool or update drivers in a minimal environment."},
        {"q": "Which macOS tool stores website passwords and WiFi keys?", "o": ["A. Keychain Access", "B. iCloud Drive", "C. Spotlight", "D. Finder"], "a": "A", "e": "Keychain is the centralized encrypted database for all macOS credentials."},
        {"q": "A technician is dealing with a 'Kernel Panic' on a Linux system. This is equivalent to what on Windows?", "o": ["A. Task Manager closing", "B. Blue Screen of Death (BSOD)", "C. A slow internet connection", "D. Low disk space warning"], "a": "B", "e": "A Kernel Panic is a critical system error from which the OS cannot recover."},
        {"q": "Which Windows tool is used to configure 'Offline Files'?", "o": ["A. Sync Center", "B. Device Manager", "C. Disk Management", "D. Task Manager"], "a": "A", "e": "Sync Center allows users to keep copies of network files on their local machine for use when disconnected."},
        {"q": "What is the purpose of 'Two-Factor Authentication' (2FA)?", "o": ["A. To make it harder to remember passwords", "B. To require a second form of identity (like a code) in addition to a password", "C. To use two different computers", "D. To use two different Wi-Fi networks"], "a": "B", "e": "2FA significantly reduces the risk of account takeover from stolen passwords."},
        {"q": "Which Linux command is used to count the number of lines, words, and characters in a file?", "o": ["A. count", "B. wc", "C. grep", "D. ls"], "a": "B", "e": "wc stands for 'word count.'"},
        {"q": "What is 'Remote Assistance' in Windows?", "o": ["A. A way to call IT", "B. A tool that allows a technician to view/control a user's screen while they are logged in", "C. A cloud backup service", "D. An automated help menu"], "a": "B", "e": "Unlike RDP (which kicks the user off), Remote Assistance is a collaborative support tool."},
        {"q": "Which type of malware records every key you press on your keyboard?", "o": ["A. Ransomware", "B. Keylogger", "C. Trojan", "D. Rootkit"], "a": "B", "e": "Keyloggers are used to steal sensitive data like passwords and credit card numbers."},
        {"q": "Which Windows tool allows a technician to see a list of all currently running services and their status?", "o": ["A. services.msc", "B. regedit", "C. msconfig", "D. dxdiag"], "a": "A", "e": "The Services console (services.msc) is the main management point for background processes."},
        {"q": "What is 'Social Engineering' primarily based on?", "o": ["A. Computer vulnerabilities", "B. Human psychology and manipulation", "C. Network speed", "D. Hardware failure"], "a": "B", "e": "Social engineering targets people, not technology."},

    let currentExam = [];
    let currentIndex = 0;
    let score = 0;

    function startExam() {
        // Randomly shuffle and pick 75
        currentExam = questions.sort(() => 0.5 - Math.random()).slice(0, 75);
        showQuestion();
    }

    function showQuestion() {
        const q = currentExam[currentIndex];
        const percent = ((currentIndex) / currentExam.length) * 100;
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of 75`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt[0], q.a, q.e);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, exp) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        const explanationDiv = document.getElementById('explanation');
        explanationDiv.style.display = 'block';
        
        if (selected === correct) {
            explanationDiv.innerHTML = `<span style="color:green; font-weight:bold;">Correct!</span>`;
            score++;
        } else {
            explanationDiv.innerHTML = `<span style="color:red; font-weight:bold;">Incorrect.</span> Correct answer was ${correct}.<br><br><strong>Note:</strong> ${exp}`;
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentExam.length) {
            showQuestion();
        } else {
            document.getElementById('question-text').style.display = 'none';
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('final-score').style.display = 'block';
            document.getElementById('score-display').innerText = `${score} / 75 (${((score/75)*100).toFixed(1)}%)`;
        }
    }

    startExam();
